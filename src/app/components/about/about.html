<section id="about" class="section about-section">
  <div class="container">
    <h2 class="section-title reveal-item">About Me</h2>

    <div class="grid-2 about-grid">
      <!-- Profile Image Column -->
      <div class="image-column reveal-item">
        <div class="image-frame-container">
          <div class="image-frame-glow"></div>
          <div class="image-frame">
            <img src="profile.png" alt="Abhishek Urs C J" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\' fill=\'%23111622\'><rect width=\'100\' height=\'100\'/><circle cx=\'50\' cy=\'40\' r=\'20\' fill=\'%238b5cf6\'/><path d=\'M20,90 Q50,60 80,90\' fill=\'%2306b6d4\'/></svg>'; this.title='Please add profile.png to directory';" />
          </div>
        </div>
      </div>

      <!-- Content Column -->
      <div class="content-column reveal-item delay-1">
        <h3 class="about-subtitle">{{ dataService.data().profile.aboutTitle }}</h3>
        <p class="about-text" [innerHTML]="dataService.data().profile.aboutText1"></p>
        <p class="about-text" [innerHTML]="dataService.data().profile.aboutText2"></p>

        <!-- Stats Grid -->
        <div class="stats-grid">
          @for (stat of dataService.data().profile.stats; track stat.label) {
            <div class="stat-card glass-card">
              <span class="stat-number">{{ stat.number }}</span>
              <span class="stat-label">{{ stat.label }}</span>
            </div>
          }
        </div>

        <div class="about-cta">
          <a href="#experience" class="btn-primary">Explore My Career</a>
        </div>
      </div>
    </div>
  </div>
</section>
