<section id="projects" class="section projects-section">
  <div class="container">
    <h2 class="section-title reveal-item">Featured Projects</h2>

    <div class="grid-3 projects-grid">
      @for (project of dataService.data().projects.list; track $index) {
        @if (project.visible) {
          <div class="project-card glass-card reveal-item">
            <div class="project-header">
              <span class="project-category">{{ project.category }}</span>
              <span class="project-icon-box"><i class="{{ project.icon }}"></i></span>
            </div>

            <div class="project-body">
              <h3 class="project-title">{{ project.title }}</h3>
              <p class="project-desc">{{ project.description }}</p>
            </div>

            <div class="project-footer">
              <div class="project-tags">
                @for (tag of project.tags; track $index) {
                  <span class="tag">{{ tag }}</span>
                }
              </div>
              
              <div class="project-link-wrapper">
                <a href="{{ project.link }}" class="project-btn" aria-label="View Project Details">
                  <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </a>
              </div>
            </div>
          </div>
        }
      }
    </div>
  </div>
</section>
